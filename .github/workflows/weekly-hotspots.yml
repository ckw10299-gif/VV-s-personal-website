name: Weekly Hotspot Crawl

on:
  schedule:
    # 09:20 every Monday in Asia/Shanghai.
    - cron: "20 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Crawl weekly hotspots
        run: node tools/crawl-hotspots.mjs

      - name: Commit weekly hotspot data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update weekly hotspot data"
          file_pattern: assets/hotspots/weekly.json
